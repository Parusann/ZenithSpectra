# Full self-hosted ZenithSpectra stack: Postgres + Ollama (Gemma 4 E4B) + FastAPI backend.
# The frontend runs on Fly.io (or `npm --prefix frontend run dev`) pointing at http://localhost:8000.
#
# Quick start:
#   docker compose up -d --build
#   docker compose exec backend alembic upgrade head                 # once
#   docker compose exec backend python ../scripts/seed_sources.py    # once (NOT idempotent)
#   curl -X POST http://localhost:8000/api/v1/ingest
#
# Override defaults via a .env file next to this compose file (POSTGRES_PASSWORD, LLM_MODEL, etc.).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenith123}
      POSTGRES_DB: ${POSTGRES_DB:-zenithspectra}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-zenithspectra}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    build: ./ollama
    environment:
      OLLAMA_MODEL: ${LLM_MODEL:-gemma4:e4b}
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    # GPU acceleration (NVIDIA) — strongly recommended; gemma4:e4b is slow on CPU.
    # Requires the NVIDIA Container Toolkit on the host. Uncomment to enable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-zenith123}@postgres:5432/${POSTGRES_DB:-zenithspectra}
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-gemma4:e4b}
      ENABLE_LLM_ENRICHMENT: ${ENABLE_LLM_ENRICHMENT:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      INGESTION_INTERVAL_HOURS: "6"
    ports:
      - "8000:8000"

volumes:
  pgdata:
  ollama:
